# /etc/nginx/sites-available/magazijn
# Kopieer naar /etc/nginx/sites-available/magazijn
# Symlink: sudo ln -s /etc/nginx/sites-available/magazijn /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name jouwdomein.nl www.jouwdomein.nl;

    # Redirect HTTP → HTTPS (activeer na SSL setup met Certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache statische assets
    location ~* \.(js|css|png|jpg|ico|svg|woff2|webmanifest)$ {
        proxy_pass http://localhost:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 10M;
}

